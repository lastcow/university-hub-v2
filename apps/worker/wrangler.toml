name = "university-hub-v2"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Local dev server. The web app proxies /api/* here via Vite.
[dev]
port = 8787
local_protocol = "http"

# This Worker serves only `/api/*`. The SPA ships separately via Cloudflare
# Pages (project: university-hub-v2-web) — see docs/deployment.md. CORS for
# the cross-origin Pages → Worker fetches is driven by ALLOWED_WEB_ORIGINS.
[vars]
APP_ENV = "production"
ALLOWED_WEB_ORIGINS = "https://university-hub-v2-web.pages.dev"

# D1 database binding — `env.DB` in the Worker.
# The actual D1 database is provisioned by QA on deploy (see UNI-16).
# For local dev, `wrangler dev --local` uses a sqlite file under .wrangler/.
[[d1_databases]]
binding = "DB"
database_name = "university-hub-v2"
database_id = "1c19aaa3-dbf6-4159-be4e-7fc89fb00752"
# Migrations live at the repo root (see epic UNI-1, section 5).
migrations_dir = "../../migrations"

# Daily D1 → R2 backup (UNI-27). 02:00 UTC every day. The Worker's scheduled
# handler attempts an in-Worker `D1.dump()` and uploads to the R2 bucket bound
# below. This is the **defense-in-depth** scheduler; the canonical, reliable
# path is `.github/workflows/d1-backup.yml` which calls `wrangler d1 export`
# from a GitHub Actions runner. See docs/disaster-recovery.md.
[triggers]
crons = ["0 2 * * *"]

# R2 backup bucket binding — `env.BACKUPS` in the Worker. The bucket itself is
# provisioned out-of-band (see docs/disaster-recovery.md → "Provision the R2
# bucket"). Customers who don't want the in-Worker cron path can simply omit
# this binding and rely on the GitHub Actions workflow.
[[r2_buckets]]
binding = "BACKUPS"
bucket_name = "university-hub-backups"
